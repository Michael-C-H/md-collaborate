# ─────────────────────────────────────────────────────────────────
# md-collab Nginx 反代配置
# by AI.Coding
#
# 路由策略：
#   /          → 前端 SPA 静态资源（含 history fallback）
#   /api/*     → 后端 REST 接口（app:3000）
#   /ws/*      → WebSocket（Hocuspocus，带 upgrade）
# ─────────────────────────────────────────────────────────────────

worker_processes auto;
events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;

  # 上传/导入需要的最大请求体（zip 50MB 留余量）
  client_max_body_size 64m;

  # WebSocket 升级所需的连接头映射
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  upstream app_upstream {
    server app:3000;
    keepalive 64;
  }

  server {
    listen 80;
    server_name _;

    # 前端 SPA 静态资源
    root /usr/share/nginx/html;
    index index.html;

    # REST 接口（含 /api/health）
    location /api/ {
      proxy_pass         http://app_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
      proxy_send_timeout 60s;
    }

    # WebSocket（Hocuspocus 长连接）
    # 注意：location /ws 不带尾斜杠，覆盖 /ws 和 /ws/* 两种；
    # Hocuspocus v2 客户端连接的是裸 /ws，文档名走握手协议而不是 URL 路径。
    location /ws {
      proxy_pass         http://app_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection $connection_upgrade;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 7d;
      proxy_send_timeout 7d;
    }

    # SPA history 模式：未命中文件都回到 index.html
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
